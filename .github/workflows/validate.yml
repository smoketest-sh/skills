name: Validate

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Check scripts
        run: |
          node --check skills/smoketest-explore/scripts/validate-manifest.mjs
          node --check skills/smoketest-explore/scripts/apply-manifest.mjs
          node --check skills/smoketest-changes/scripts/validate-manifest.mjs
          node --check skills/smoketest-changes/scripts/apply-manifest.mjs
          node --check skills/smoketest-changes/scripts/collect-changes.mjs
      - name: Validate fixture manifest
        run: |
          node skills/smoketest-explore/scripts/validate-manifest.mjs test/fixtures/explore/manifest.json
          node skills/smoketest-changes/scripts/validate-manifest.mjs test/fixtures/changes/manifest.json
      - name: Dry-run fixture apply
        run: |
          node skills/smoketest-explore/scripts/apply-manifest.mjs test/fixtures/explore/manifest.json --project Production
          node skills/smoketest-changes/scripts/apply-manifest.mjs test/fixtures/changes/manifest.json --project Production
      - name: Collect git change evidence
        run: node skills/smoketest-changes/scripts/collect-changes.mjs --base HEAD~1 --json
      - name: Validate skill package
        run: npx --yes skills add . --list
      - name: Validate plugin JSON
        run: |
          node -e 'for (const file of [".codex-plugin/plugin.json",".claude-plugin/plugin.json",".agents/plugins/marketplace.json",".claude-plugin/marketplace.json"]) JSON.parse(require("node:fs").readFileSync(file, "utf8"))'
